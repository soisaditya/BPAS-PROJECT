<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Performance Analytics Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --background: #f8fafc;
            --card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --border-light: #e2e8f0;
            --accent-light: #eff6ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background-color: var(--card);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .sidebar-header {
            padding: 1.5rem;
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            color: var(--accent);
        }

        .sidebar-header p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .sidebar-nav {
            flex: 1;
            padding: 0 1rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0.75rem;
            background-color: var(--accent-light);
            color: var(--accent);
            text-decoration: none;
            border-radius: 0.375rem;
            font-weight: 500;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .header {
            height: 4rem;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            background-color: rgba(255, 255, 255, 0.8);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(4px);
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .header h2 {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-greeting {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .btn-logout {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
            padding: 0.35rem 0.85rem;
            border: 1.5px solid var(--accent);
            border-radius: 0.4rem;
            transition: background 0.2s, color 0.2s;
        }

        .btn-logout:hover {
            background: var(--accent);
            color: #fff;
        }

        .content {
            padding: 2rem;
        }

        /* Dashboard specific styles */
        .grid {
            display: grid;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .grid-cols-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .grid-cols-4 {
            grid-template-columns: repeat(4, 1fr);
        }

        .card {
            background-color: var(--card);
            border: 1px solid var(--border-light);
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .card-desc {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
            line-height: 1.4;
        }

        .metric-title {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--accent);
        }

        .metric-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            line-height: 1.5;
        }

        .chart-container {
            flex: 1;
            min-height: 0;
            position: relative;
            margin-top: 1rem;
        }

        .h-96 {
            height: 24rem;
        }

        .h-88 {
            height: 22rem;
        }

        @media (max-width: 1024px) {
            .grid-cols-4 {
                grid-template-columns: repeat(2, 1fr);
            }

            .grid-cols-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>BPAS Dashboard</h1>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="7" height="9" x="3" y="3" rx="1" />
                    <rect width="7" height="5" x="14" y="3" rx="1" />
                    <rect width="7" height="9" x="14" y="12" rx="1" />
                    <rect width="7" height="5" x="3" y="16" rx="1" />
                </svg>
                Overview
            </a>
            <a href="/upload" class="nav-item" style="background-color: transparent; color: var(--text-main);">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                Upload Dataset
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <h2>Business Performance Analytics</h2>
            <div class="header-user">
                {% if session.get('user_name') %}
                <span class="user-greeting">👤 {{ session['user_name'] }}</span>
                <a href="/logout" class="btn-logout">Log Out</a>
                {% endif %}
            </div>
        </header>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>

</html>
